<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>邓肯-张参数收集系统（完整版·支持Excel导入）</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Microsoft YaHei', Arial; overflow: hidden; }
        #map-container { position: absolute; left: 360px; top: 0; width: calc(100vw - 360px); height: 100vh; }
        #sidebar {
            position: absolute; left: 0; top: 0; width: 360px; height: 100vh;
            background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px; overflow-y: auto; z-index: 100;
        }
        .section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .section h3 { margin-top: 0; color: #2c3e50; border-left: 4px solid #3498db; padding-left: 10px; }
        .btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: none; border-radius: 6px; font-size: 15px; font-weight: bold;
            cursor: pointer; transition: 0.2s; text-align: center;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-purple { background: #9b59b6; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .param-btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .param-btn {
            flex: 1; min-width: 100px; padding: 10px; border: none; border-radius: 5px;
            font-size: 14px; cursor: pointer; color: white; font-weight: bold;
        }
        #cohesion-btn { background: #ff6b6b; }
        #friction-btn { background: #4ecdc4; }
        #modulus-btn { background: #45b7d1; }
        #heatmap-btn { background: #96ceb4; }
        #clear-display-btn { background: #95a5a6; }
        .stats-card { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .stats-row { display: flex; justify-content: space-between; margin: 8px 0; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { background: #34495e; color: white; padding: 8px; position: sticky; top: 0; }
        .data-table td { padding: 6px; border-bottom: 1px solid #ddd; text-align: center; }
        .data-table tr:hover { background: #f5f5f5; }
        .data-table-container { max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; }
        .file-zone {
            border: 2px dashed #3498db; border-radius: 10px; padding: 30px 20px;
            text-align: center; background: #f0f7ff; margin: 15px 0; cursor: pointer;
        }
        .file-zone:hover { background: #e1f0fa; }
        .manual-form { background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 15px 0; display: none; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .flex { display: flex; gap: 10px; }
        .flex button { flex: 1; }
    </style>
    <!-- 引入高德地图API和SheetJS（用于处理Excel） -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=521cbc548a03bef89df50e3be3b666c1"></script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=521cbc548a03bef89df50e3be3b666c1&plugin=AMap.Heatmap"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="map-container"></div>
    <div id="sidebar">
        <h2 style="margin-top:0; color:#2c3e50; text-align:center;">邓肯-张参数管理</h2>
        
        <!-- 手动输入区域（默认隐藏，点击地图时显示） -->
        <div class="manual-form" id="manualForm">
            <h4 style="margin-top:0;">📝 手动输入参数</h4>
            <div class="form-group">
                <label>位置名称（可选）</label>
                <input type="text" id="locationName" placeholder="如：北京工地A区">
            </div>
            <div class="form-group">
                <label>经度</label>
                <input type="number" id="lngInput" step="0.000001" readonly>
            </div>
            <div class="form-group">
                <label>纬度</label>
                <input type="number" id="latInput" step="0.000001" readonly>
            </div>
            <div class="form-group">
                <label>黏聚力 c (kPa)</label>
                <input type="number" id="cohesionInput" step="0.1" placeholder="如：45.6">
            </div>
            <div class="form-group">
                <label>内摩擦角 φ (°)</label>
                <input type="number" id="frictionInput" step="0.1" placeholder="如：30.5">
            </div>
            <div class="form-group">
                <label>弹性模量 E (MPa)</label>
                <input type="number" id="modulusInput" step="1" placeholder="如：1200">
            </div>
            <div class="form-group">
                <label>文献来源（可选）</label>
                <input type="text" id="sourceInput" placeholder="论文标题或编号">
            </div>
            <div class="flex">
                <button class="btn btn-success" id="submitManual">提交</button>
                <button class="btn btn-danger" id="cancelManual">取消</button>
            </div>
        </div>

        <!-- 批量导入区域 -->
        <div class="section">
            <h3>📂 批量导入数据</h3>
            <div class="file-zone" id="dropZone">
                <div style="font-size: 40px;">📁</div>
                <p><strong>拖拽CSV或Excel文件到此处</strong><br>或点击选择</p>
                <input type="file" id="fileInput" accept=".csv,.txt,.xlsx,.xls" style="display:none;">
                <p style="font-size:12px; color:#666;">支持格式：CSV / Excel（列顺序：位置名称,经度,纬度,黏聚力,内摩擦角,弹性模量,文献来源）</p>
            </div>
            <button class="btn btn-primary" id="downloadTemplateBtn">📥 下载CSV模板</button>
        </div>

        <!-- 导出操作 -->
        <div class="section">
            <h3>📤 导出数据</h3>
            <button class="btn btn-success" id="exportCSV">📊 导出为CSV</button>
            <button class="btn btn-purple" id="exportExcel">📗 导出为Excel</button>
        </div>

        <!-- 数据显示控制 -->
        <div class="section">
            <h3>🎨 数据显示</h3>
            <div class="param-btn-group">
                <button class="param-btn" id="cohesion-btn">黏聚力</button>
                <button class="param-btn" id="friction-btn">内摩擦角</button>
                <button class="param-btn" id="modulus-btn">弹性模量</button>
            </div>
            <div class="param-btn-group" style="margin-top:10px;">
                <button class="param-btn" id="heatmap-btn">显示云图</button>
                <button class="param-btn" id="clear-display-btn">清除显示</button>
            </div>
            <button class="btn btn-danger" id="clearAllBtn" style="margin-top:15px;">🗑️ 清空所有数据</button>
        </div>

        <!-- 数据统计 -->
        <div class="stats-card">
            <h4 style="margin:0 0 10px;">📊 数据统计</h4>
            <div class="stats-row"><span>总数据点：</span><span id="totalCount">0</span></div>
            <div class="stats-row"><span>完整参数组：</span><span id="completeCount">0</span></div>
            <div class="stats-row"><span>黏聚力范围：</span><span id="cohesionRange">-</span></div>
            <div class="stats-row"><span>内摩擦角范围：</span><span id="frictionRange">-</span></div>
            <div class="stats-row"><span>弹性模量范围：</span><span id="modulusRange">-</span></div>
        </div>

        <!-- 数据预览表格 -->
        <div class="section">
            <h3>📋 最近数据</h3>
            <div class="data-table-container">
                <table class="data-table">
                    <thead>
                        <tr><th>位置</th><th>c</th><th>φ</th><th>E</th></tr>
                    </thead>
                    <tbody id="dataTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let map = null;
        let currentPosition = { lng: 116.397428, lat: 39.90923 };
        let allMarkers = [];
        let heatmap = null;
        let collectedData = [];

        // ---------- 初始化地图 ----------
        function initMap() {
            map = new AMap.Map('map-container', {
                zoom: 10,
                center: [currentPosition.lng, currentPosition.lat],
                viewMode: '2D'
            });
            map.on('click', function(e) {
                currentPosition = {
                    lng: e.lnglat.getLng(),
                    lat: e.lnglat.getLat()
                };
                document.getElementById('lngInput').value = currentPosition.lng.toFixed(6);
                document.getElementById('latInput').value = currentPosition.lat.toFixed(6);
                document.getElementById('manualForm').style.display = 'block';
            });
        }

        // ---------- 辅助函数：添加标记 ----------
        function addMarker(data, simplified = false) {
            let content;
            if (simplified) {
                content = `<div style="background:#4CAF50; color:white; padding:5px; border-radius:50%; width:30px; height:30px; text-align:center; line-height:20px;">📍</div>`;
            } else {
                content = `
                    <div style="background:white; padding:10px; border:2px solid #4CAF50; border-radius:5px; max-width:200px;">
                        <div><b>${data.locationName || '未命名'}</b></div>
                        <div>c: ${data.cohesion || '-'} kPa</div>
                        <div>φ: ${data.frictionAngle || '-'}°</div>
                        <div>E: ${data.modulus || '-'} MPa</div>
                        <div style="font-size:11px; color:#666;">${data.source || ''}</div>
                    </div>
                `;
            }
            const marker = new AMap.Marker({
                position: [data.position.lng, data.position.lat],
                content: content,
                offset: simplified ? new AMap.Pixel(-15,-15) : new AMap.Pixel(-100,-80)
            });
            marker.setMap(map);
            allMarkers.push(marker);
        }

        // 清除所有标记
        function clearMarkers() {
            allMarkers.forEach(m => m.setMap(null));
            allMarkers = [];
        }

        // 清除显示（标记+热力图）
        function clearDisplay() {
            clearMarkers();
            if (heatmap) {
                map.remove(heatmap);
                heatmap = null;
            }
        }

        // 更新统计和表格
        function updateStatsAndTable() {
            const total = collectedData.length;
            document.getElementById('totalCount').innerText = total;
            const complete = collectedData.filter(d => d.cohesion && d.frictionAngle && d.modulus).length;
            document.getElementById('completeCount').innerText = complete;

            const cValues = collectedData.map(d => d.cohesion).filter(v => v);
            const fValues = collectedData.map(d => d.frictionAngle).filter(v => v);
            const eValues = collectedData.map(d => d.modulus).filter(v => v);
            document.getElementById('cohesionRange').innerText = cValues.length ? Math.min(...cValues).toFixed(1)+'~'+Math.max(...cValues).toFixed(1) : '-';
            document.getElementById('frictionRange').innerText = fValues.length ? Math.min(...fValues).toFixed(1)+'~'+Math.max(...fValues).toFixed(1) : '-';
            document.getElementById('modulusRange').innerText = eValues.length ? Math.min(...eValues).toFixed(0)+'~'+Math.max(...eValues).toFixed(0) : '-';

            // 更新表格（最近10条）
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            collectedData.slice(-10).forEach(d => {
                const row = tbody.insertRow();
                row.insertCell().innerText = (d.locationName || '--').substring(0,8);
                row.insertCell().innerText = d.cohesion || '-';
                row.insertCell().innerText = d.frictionAngle || '-';
                row.insertCell().innerText = d.modulus || '-';
            });
        }

        // 重新显示所有标记（简化模式）
        function showAllMarkers() {
            clearMarkers();
            collectedData.forEach(d => addMarker(d, true));
        }

        // ---------- 参数显示函数 ----------
        function showParameter(param) {
            clearMarkers();
            let color = '#ff6b6b';
            if (param === 'frictionAngle') color = '#4ecdc4';
            else if (param === 'modulus') color = '#45b7d1';
            collectedData.forEach(d => {
                const val = d[param];
                if (val) {
                    const content = `<div style="background:${color}; color:white; padding:8px; border-radius:50%; width:40px; height:40px; text-align:center; line-height:24px; font-weight:bold;">${val}</div>`;
                    const marker = new AMap.Marker({
                        position: [d.position.lng, d.position.lat],
                        content: content,
                        offset: new AMap.Pixel(-20,-20)
                    });
                    marker.setMap(map);
                    allMarkers.push(marker);
                }
            });
        }

        function showHeatmap(param = 'cohesion') {
            if (heatmap) map.remove(heatmap);
            const data = collectedData.filter(d => d[param]).map(d => ({
                lng: d.position.lng,
                lat: d.position.lat,
                count: d[param]
            }));
            if (!data.length) { alert('没有该参数的数据'); return; }
            heatmap = new AMap.Heatmap(map, {
                radius: 25,
                opacity: [0,0.8],
                gradient: { 0.4:'blue',0.65:'cyan',0.8:'lime',0.95:'yellow',1.0:'red' }
            });
            heatmap.setDataSet({ data, max: Math.max(...data.map(d=>d.count)) });
        }

        // ---------- 数据持久化 ----------
        function saveToLocal() {
            localStorage.setItem('duncanData', JSON.stringify(collectedData));
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('duncanData');
            if (saved) {
                try {
                    collectedData = JSON.parse(saved);
                    showAllMarkers();
                    updateStatsAndTable();
                } catch(e) { console.warn('加载失败', e); }
            }
        }

        // ---------- 手动提交 ----------
        document.getElementById('submitManual').onclick = function() {
            const dataPoint = {
                locationName: document.getElementById('locationName').value || '手动点',
                position: { 
                    lng: parseFloat(document.getElementById('lngInput').value),
                    lat: parseFloat(document.getElementById('latInput').value)
                },
                cohesion: parseFloat(document.getElementById('cohesionInput').value) || 0,
                frictionAngle: parseFloat(document.getElementById('frictionInput').value) || 0,
                modulus: parseFloat(document.getElementById('modulusInput').value) || 0,
                source: document.getElementById('sourceInput').value || '手动录入',
                time: new Date().toLocaleString()
            };
            collectedData.push(dataPoint);
            addMarker(dataPoint);
            saveToLocal();
            updateStatsAndTable();
            // 清空表单并隐藏
            document.getElementById('locationName').value = '';
            document.getElementById('cohesionInput').value = '';
            document.getElementById('frictionInput').value = '';
            document.getElementById('modulusInput').value = '';
            document.getElementById('sourceInput').value = '';
            document.getElementById('manualForm').style.display = 'none';
            alert('数据已添加');
        };

        document.getElementById('cancelManual').onclick = function() {
            document.getElementById('manualForm').style.display = 'none';
        };

        // ---------- 批量导入（支持CSV和Excel）----------
        function parseCSV(text) {
            const lines = text.split('\n').filter(l => l.trim());
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            const results = [];
            for (let i=1; i<lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                if (values.length < 6) continue;
                // 期望列顺序：位置名称,经度,纬度,黏聚力,内摩擦角,弹性模量,文献来源(可选)
                const item = {
                    locationName: values[0] || '导入点',
                    position: { lng: parseFloat(values[1]), lat: parseFloat(values[2]) },
                    cohesion: parseFloat(values[3]) || 0,
                    frictionAngle: parseFloat(values[4]) || 0,
                    modulus: parseFloat(values[5]) || 0,
                    source: values[6] || '批量导入',
                    time: new Date().toLocaleString()
                };
                if (!isNaN(item.position.lng) && !isNaN(item.position.lat)) results.push(item);
            }
            return results;
        }

        function handleFile(file) {
            const fileName = file.name;
            const extension = fileName.split('.').pop().toLowerCase();

            if (extension === 'csv' || extension === 'txt') {
                // 处理 CSV/TXT
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = parseCSV(e.target.result);
                    if (data.length) {
                        collectedData.push(...data);
                        saveToLocal();
                        showAllMarkers();
                        updateStatsAndTable();
                        alert(`成功导入 ${data.length} 条数据！`);
                    } else {
                        alert('未解析到有效数据，请检查CSV格式。');
                    }
                };
                reader.readAsText(file, 'UTF-8');
            } else if (extension === 'xlsx' || extension === 'xls') {
                // 处理 Excel 文件
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
                    if (rows.length < 2) {
                        alert('Excel 文件没有数据行');
                        return;
                    }
                    // 假设第一行是表头，从第二行开始解析
                    const imported = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length < 6) continue; // 至少要有6列
                        const item = {
                            locationName: row[0] || '导入点',
                            position: { lng: parseFloat(row[1]), lat: parseFloat(row[2]) },
                            cohesion: parseFloat(row[3]) || 0,
                            frictionAngle: parseFloat(row[4]) || 0,
                            modulus: parseFloat(row[5]) || 0,
                            source: row[6] || '批量导入',
                            time: new Date().toLocaleString()
                        };
                        if (!isNaN(item.position.lng) && !isNaN(item.position.lat)) {
                            imported.push(item);
                        }
                    }
                    if (imported.length) {
                        collectedData.push(...imported);
                        saveToLocal();
                        showAllMarkers();
                        updateStatsAndTable();
                        alert(`成功导入 ${imported.length} 条数据！`);
                    } else {
                        alert('未解析到有效数据，请检查 Excel 列顺序是否正确。');
                    }
                };
                reader.readAsArrayBuffer(file);
            } else {
                alert('不支持的文件格式，请上传 CSV 或 Excel 文件。');
            }
        }

        // 文件选择
        document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        };
        // 拖拽
        const dropZone = document.getElementById('dropZone');
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = '#e1f0fa'; };
        dropZone.ondragleave = () => { dropZone.style.background = '#f0f7ff'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.background = '#f0f7ff';
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        };

        // 下载CSV模板
        document.getElementById('downloadTemplateBtn').onclick = function() {
            const template = '位置名称,经度,纬度,黏聚力(kPa),内摩擦角(°),弹性模量(MPa),文献来源\n北京工地A区,116.397428,39.90923,45.6,30.5,1200,张三等(2020)\n上海试验点,121.473701,31.230416,32.1,25.8,950,李四(2019)';
            const blob = new Blob(['\uFEFF' + template], {type:'text/csv;charset=utf-8'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '邓肯-张参数模板.csv';
            link.click();
        };

        // ---------- 导出CSV ----------
        document.getElementById('exportCSV').onclick = function() {
            if (!collectedData.length) { alert('没有数据可导出'); return; }
            let csv = '位置名称,经度,纬度,黏聚力(kPa),内摩擦角(°),弹性模量(MPa),文献来源,录入时间\n';
            collectedData.forEach(d => {
                csv += `"${d.locationName || ''}",${d.position.lng},${d.position.lat},${d.cohesion || ''},${d.frictionAngle || ''},${d.modulus || ''},"${d.source || ''}","${d.time || ''}"\n`;
            });
            const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `邓肯张数据_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        };

        // ---------- 导出Excel ----------
        document.getElementById('exportExcel').onclick = function() {
            if (!collectedData.length) { alert('没有数据可导出'); return; }
            const wsData = [['位置名称','经度','纬度','黏聚力(kPa)','内摩擦角(°)','弹性模量(MPa)','文献来源','录入时间']];
            collectedData.forEach(d => {
                wsData.push([
                    d.locationName || '',
                    d.position.lng,
                    d.position.lat,
                    d.cohesion || '',
                    d.frictionAngle || '',
                    d.modulus || '',
                    d.source || '',
                    d.time || ''
                ]);
            });
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, '邓肯张参数');
            XLSX.writeFile(wb, `邓肯张数据_${new Date().toISOString().slice(0,10)}.xlsx`);
        };

        // ---------- 清空所有数据 ----------
        document.getElementById('clearAllBtn').onclick = function() {
            if (collectedData.length && confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                collectedData = [];
                clearDisplay();
                saveToLocal();
                updateStatsAndTable();
            }
        };

        // ---------- 显示控制按钮绑定 ----------
        document.getElementById('cohesion-btn').onclick = () => showParameter('cohesion');
        document.getElementById('friction-btn').onclick = () => showParameter('frictionAngle');
        document.getElementById('modulus-btn').onclick = () => showParameter('modulus');
        document.getElementById('heatmap-btn').onclick = () => showHeatmap('cohesion');
        document.getElementById('clear-display-btn').onclick = clearDisplay;

        // ---------- 启动 ----------
        window.onload = function() {
            initMap();
            loadFromLocal();  // 恢复之前保存的数据
            console.log('系统初始化完成（支持Excel导入）');
        };
    </script>
</body>
</html>
